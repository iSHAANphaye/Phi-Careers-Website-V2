{% extends "base.html" %}

{% block title %}Sign Up - Phi Careers{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="card auth-card">
        <h2>Create an account</h2>
        <p class="subtitle">Join our platform as a candidate or an employer.</p>
        
        <form method="POST" action="{{ url_for('auth.register') }}">
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" class="form-control" placeholder="John Doe" required>
            </div>
            
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" class="form-control" placeholder="you@example.com" required>
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" required>
            </div>
            
            <div class="form-group">
                <label for="confirm_password">Confirm Password</label>
                <input type="password" id="confirm_password" name="confirm_password" class="form-control" placeholder="••••••••" required>
            </div>
            
            <div class="form-group">
                <label for="role">Join As</label>
                <select id="role" name="role" class="form-control" style="background-image: none;" required>
                    <option value="candidate">Candidate (Looking for Jobs)</option>
                    <option value="employer">Employer (Posting Jobs)</option>
                </select>
            </div>

            <div class="form-group" id="company-name-group" style="display: none;">
                <label for="company_name">Company Name</label>
                <input type="text" id="company_name" name="company_name" class="form-control" placeholder="e.g. Acme Corp">
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 0.5rem;">
                Create Account
            </button>

            <script>
                const roleSelect = document.getElementById('role');
                const companyGroup = document.getElementById('company-name-group');
                const companyInput = document.getElementById('company_name');

                roleSelect.addEventListener('change', function() {
                    if (this.value === 'employer') {
                        companyGroup.style.display = 'block';
                        companyInput.required = true;
                    } else {
                        companyGroup.style.display = 'none';
                        companyInput.required = false;
                        companyInput.value = '';
                    }
                });
            </script>
        </form>
        
        <p style="margin-top: 1.5rem; text-align: center; font-size: 0.9rem; color: var(--text-secondary);">
            Already have an account? <a href="{{ url_for('auth.login') }}" style="color: var(--accent-indigo); text-decoration: none; font-weight: 500;">Log In</a>
        </p>
    </div>
</div>
{% endblock %}
