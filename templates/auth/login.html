{% extends "base.html" %}

{% block title %}Log In - Phi Careers{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="card auth-card">
        <h2>Welcome back</h2>
        <p class="subtitle">Log in to manage your job applications or listings.</p>
        
        <form method="POST" action="{{ url_for('auth.login') }}">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" class="form-control" placeholder="you@example.com" required>
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" required>
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 0.5rem;">
                Log In
            </button>
        </form>
        
        <p style="margin-top: 1.5rem; text-align: center; font-size: 0.9rem; color: var(--text-secondary);">
            Don't have an account? <a href="{{ url_for('auth.register') }}" style="color: var(--accent-indigo); text-decoration: none; font-weight: 500;">Sign Up</a>
        </p>
    </div>
</div>
{% endblock %}
